<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미래직업 추리퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#13131c;--surface2:#1c1c2a;--border:#2a2a3d;
  --accent:#7c6ff7;--accent2:#f7c06f;
  --text:#f0eff8;--muted:#7a7a9a;
  --s1:#6ff7c0;--s2:#f7c06f;--s3:#f76f6f;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 80px;overflow-x:hidden;
}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(124,111,247,.15),transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-150px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(111,247,192,.10),transparent 70%);pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:560px;position:relative;z-index:1;}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:32px;}
.hdr .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--accent);border:1px solid rgba(124,111,247,.4);padding:4px 12px;border-radius:100px;margin-bottom:12px;}
.hdr h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(28px,6vw,40px);line-height:1.15;}
.hdr h1 span{color:var(--accent);}
.hdr p{margin-top:10px;font-size:14px;color:var(--muted);line-height:1.6;}

/* ── SCOREBOARD ── */
.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;}
.sc .l{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-bottom:6px;}
.sc .v{font-family:'Black Han Sans',sans-serif;font-size:28px;line-height:1;}
.sc .v.y{color:var(--accent2);}

/* ── QUIZ CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}

/* clue area */
.clue-area{padding:20px 24px;border-bottom:1px solid var(--border);}
.clue-lbl{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;}
.char-boxes{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.cbox{width:44px;height:52px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.cbox .cs{font-size:16px;font-weight:700;color:var(--accent);}
.cbox .ci{font-size:10px;color:var(--muted);}
.wgap{width:12px;height:2px;background:var(--border);border-radius:2px;margin:0 2px;}
.cnt-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,111,247,.12);border:1px solid rgba(124,111,247,.3);border-radius:100px;padding:5px 14px;font-size:13px;color:var(--accent);font-weight:500;margin-top:12px;}

/* step block */
.sblock{border-bottom:1px solid var(--border);}
.sblock:last-of-type{border-bottom:none;}
.shdr{display:flex;align-items:center;gap:12px;padding:16px 24px 0;}
.spill{font-size:11px;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:100px;flex-shrink:0;}
.spill.s1{background:rgba(111,247,192,.15);color:var(--s1);border:1px solid rgba(111,247,192,.3);}
.spill.s2{background:rgba(247,192,111,.15);color:var(--s2);border:1px solid rgba(247,192,111,.3);}
.spill.s3{background:rgba(247,111,111,.15);color:var(--s3);border:1px solid rgba(247,111,111,.3);}
.smeta{flex:1;font-size:13px;color:var(--muted);}
.spts{font-size:13px;font-weight:700;}
.spts.s1{color:var(--s1);}.spts.s2{color:var(--s2);}.spts.s3{color:var(--s3);}
.slock{font-size:16px;opacity:.45;}

.scontent{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.scontent.open{max-height:300px;}

/* dots */
.dots-row{display:flex;align-items:center;gap:6px;padding:14px 24px 8px;}
.dot{width:8px;height:8px;border-radius:50%;transition:background .2s;}
.dot.idle{background:var(--border);}
.dot.used{background:var(--s3);}
.dots-lbl{font-size:12px;color:var(--muted);margin-left:4px;}

/* input */
.iarea{padding:0 24px 18px;}
.iwrap{display:flex;gap:8px;}
.ainput{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;font-size:15px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;
}
.ainput::placeholder{color:var(--muted);}
.ainput:focus{border-color:var(--accent);}
.ainput:disabled{opacity:.35;cursor:not-allowed;}
.sbtn{
  padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .1s;
}
.sbtn:hover{opacity:.85;}.sbtn:active{transform:scale(.97);}
.sbtn:disabled{opacity:.25;cursor:not-allowed;}

/* feedback */
.fblist{padding:0 24px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px;}
.fb{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;line-height:1.5;}
.fb.wrong{background:rgba(247,111,111,.12);border:1px solid rgba(247,111,111,.25);color:var(--s3);}
.fb.ok{background:rgba(111,247,192,.12);border:1px solid rgba(111,247,192,.25);color:var(--s1);}
.fb.half{background:rgba(247,192,111,.12);border:1px solid rgba(247,192,111,.25);color:var(--s2);}

/* answer reveal */
.reveal{margin:0 16px 20px;padding:16px;background:rgba(124,111,247,.08);border:1px solid rgba(124,111,247,.3);border-radius:12px;display:none;}
.reveal.show{display:block;}
.rv-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--accent);margin-bottom:6px;}
.rv-txt{font-family:'Black Han Sans',sans-serif;font-size:22px;}

/* next btn */
.nxtbtn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--accent),#9c91fa);
  color:#fff;border:none;border-radius:var(--r);
  font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;display:none;transition:opacity .2s,transform .1s;margin-bottom:16px;
}
.nxtbtn:hover{opacity:.9;}.nxtbtn:active{transform:scale(.98);}
.nxtbtn.show{display:block;}

/* score log */
.slog{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:16px;display:none;}
.slog-ttl{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;}
.litems{display:flex;flex-direction:column;gap:8px;}
.litem{display:flex;align-items:center;gap:10px;font-size:14px;}
.lq{flex:0 0 28px;color:var(--muted);}
.lans{flex:1;font-weight:500;}
.lpts{font-family:'Black Han Sans',sans-serif;font-size:18px;min-width:52px;text-align:right;}
.lpts.p3{color:var(--s1);}.lpts.p2{color:var(--s2);}.lpts.p1{color:var(--s3);}.lpts.ph{color:var(--s2);}.lpts.p0{color:var(--muted);}

/* ── RESULT SCREEN ── */
#result{display:none;}
#result.show{display:block;}
.res-hero{text-align:center;padding:20px 0 28px;}
.res-em{font-size:72px;line-height:1;margin-bottom:12px;}
.res-msg{font-size:20px;font-weight:700;margin-bottom:8px;}
.res-sub{font-size:14px;color:var(--muted);}
.res-sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;text-align:center;margin-bottom:20px;}
.res-big{font-family:'Black Han Sans',sans-serif;font-size:56px;color:var(--accent2);line-height:1;margin-bottom:6px;}
.res-max{font-size:14px;color:var(--muted);}

/* review cards */
.rev-sec{margin-bottom:20px;}
.rev-ttl{font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.rcard-hdr{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;gap:10px;}
.rcard-hdr:hover{background:var(--surface2);}
.rnum{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--muted);flex-shrink:0;}
.rans{font-size:15px;font-weight:700;flex:1;}
.rpts{font-family:'Black Han Sans',sans-serif;font-size:18px;flex-shrink:0;}
.rpts.p3{color:var(--s1);}.rpts.p2{color:var(--s2);}.rpts.p1{color:var(--s3);}.rpts.ph{color:var(--s2);}.rpts.p0{color:var(--muted);}
.rchev{font-size:12px;color:var(--muted);transition:transform .3s;flex-shrink:0;}
.rchev.open{transform:rotate(180deg);}
.rbody{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.rbody.open{max-height:800px;}
.rstep{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.rstep:last-child{border-bottom:none;}
.rspill{font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:100px;flex-shrink:0;margin-top:3px;}
.more-btn-wrap{padding:12px 18px;border-top:1px solid var(--border);}
.more-btn{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--accent);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .2s;}
.more-btn:hover{opacity:.8;}
.rspill.s1{background:rgba(111,247,192,.15);color:var(--s1);border:1px solid rgba(111,247,192,.3);}
.rspill.s2{background:rgba(247,192,111,.15);color:var(--s2);border:1px solid rgba(247,192,111,.3);}
.rspill.s3{background:rgba(247,111,111,.15);color:var(--s3);border:1px solid rgba(247,111,111,.3);}
.rslbl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.rstxt{font-size:14px;line-height:1.65;}

.restart{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .2s;margin-bottom:16px;}
.restart:hover{opacity:.85;}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .4s ease both;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.shake{animation:shake .3s ease;}
@keyframes pulseG{0%{box-shadow:0 0 0 0 rgba(111,247,192,.4);}70%{box-shadow:0 0 0 14px rgba(111,247,192,0);}100%{box-shadow:0 0 0 0 rgba(111,247,192,0);}}
.pulse{animation:pulseG .55s ease;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr fade-up">
    <div class="tag">FUTURE JOB QUIZ</div>
    <h1>미래직업<br><span>추리퀴즈</span></h1>
    <p>모둠원과 함께 모은 힌트로 미래 직업을 맞혀보세요!<br>빨리 맞힐수록 더 높은 점수 · 단계당 최대 2번 도전</p>
  </div>

  <div class="scores fade-up">
    <div class="sc"><div class="l">총 점수</div><div class="v y" id="tscore">0</div></div>
    <div class="sc"><div class="l">문제</div><div class="v" id="qprog">1 / 5</div></div>
    <div class="sc"><div class="l">만점</div><div class="v" id="maxsc">15</div></div>
  </div>

  <div id="quiz-area"></div>

  <div class="slog" id="slog">
    <div class="slog-ttl">📋 점수 기록</div>
    <div class="litems" id="loglist"></div>
  </div>

  <div id="result">
    <div class="res-hero">
      <div class="res-em" id="rem">🎉</div>
      <div class="res-msg" id="rmsg"></div>
      <div class="res-sub" id="rsub"></div>
    </div>
    <div class="res-sc">
      <div class="res-big" id="rbig"></div>
      <div class="res-max" id="rmax"></div>
    </div>
    <div class="rev-sec">
      <div class="rev-ttl">📖 문제 다시 보기 — 눌러서 힌트 복습</div>
      <div id="revlist"></div>
    </div>
    <button class="restart" onclick="restart()">🔄 처음부터 다시 시작</button>
  </div>

</div>
<script>
/* ═══════════ DATA ═══════════ */
const Q = [
  {
    words:["자동차","사이버보안","전문가"],
    answer:"자동차 사이버보안 전문가",
    hint1:"핸들을 잡고 앞만 보며 운전하는 '운전기사'",
    hint2:"자동차가 스스로 길을 찾고, 운전자는 안에서 영화를 보거나 잠을 자요.",
    hint3:"자동차 소프트웨어가 사이버 상에서 해킹을 당하면 차가 흉기가 될 수 있죠! 이 '바퀴 달린 컴퓨터'를 지키는 직업은?"
  },
  {
    words:["스마트","헬스케어","전문가"],
    answer:"스마트 헬스케어 전문가",
    hint1:"병원에 가야만 혈압·혈당을 측정하고 의사에게 진찰을 받을 수 있었어요.",
    hint2:"스마트워치가 실시간으로 심장박동을 재고, 앱이 운동·식단을 관리해줘요.",
    hint3:"개인 건강 데이터를 분석하고 AI 기반 맞춤 건강 솔루션을 설계하는 직업은?"
  },
  {
    words:["우주","쓰레기","청소부"],
    answer:"우주 쓰레기 청소부",
    hint1:"로켓을 쏘아 올리고 임무가 끝나면 위성은 그냥 우주에 버려졌어요.",
    hint2:"지구 주변에 수만 개의 폐위성·파편이 떠다니며 새 위성과 충돌 위험이 생겼어요.",
    hint3:"레이저·로봇팔·그물 등으로 궤도 위 잔해를 수거하고 처리하는 직업은?"
  },
  {
    words:["스마트팜","운영자"],
    answer:"스마트팜 운영자",
    hint1:"농부가 직접 밭에 나가 씨를 뿌리고, 물을 주고, 해충을 눈으로 확인했어요.",
    hint2:"센서·드론·AI가 토양 상태를 분석하고 물·비료를 자동으로 공급해요.",
    hint3:"데이터 기반으로 작물 생육을 원격 제어하고 최적 수확 시점을 결정하는 직업은?"
  },
  {
    words:["3D프린팅","건축","전문가"],
    answer:"3D프린팅 건축 전문가",
    hint1:"벽돌을 하나하나 쌓고 철근·콘크리트를 부어 건물을 짓는 '건축가'",
    hint2:"거대한 3D 프린터가 콘크리트를 층층이 쌓아 하루 만에 집 한 채를 완성해요.",
    hint3:"건물 설계 데이터를 3D 출력 명령으로 변환하고 프린팅 공정을 감독하는 직업은?"
  }
];

const MAX = 2; // max attempts per step

let S = {
  qi:0, step:1, done:false,
  att:{1:0,2:0,3:0},
  total:0, log:[]
};

/* ── helpers ── */
function consonant(ch){
  const c=ch.charCodeAt(0)-0xAC00;
  if(c<0||c>11171)return ch;
  return 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ'.split('')[Math.floor(c/28/21)];
}
function norm(s){return s.replace(/\s/g,'').toLowerCase();}
function match(a,b){return norm(a)===norm(b);}

/* ── render ── */
function render(){
  const q=Q[S.qi];
  document.getElementById('qprog').textContent=`${S.qi+1} / ${Q.length}`;
  document.getElementById('maxsc').textContent=Q.length*3;

  // clue boxes
  let boxes='';
  q.words.forEach((w,wi)=>{
    if(wi>0)boxes+='<div class="wgap"></div>';
    [...w].forEach((c,i)=>{ boxes+=`<div class="cbox"><span class="cs">${consonant(c)}</span><span class="ci">${i+1}</span></div>`; });
  });
  const total=q.words.reduce((s,w)=>s+w.length,0);
  const info=q.words.map(w=>`${w.length}자`).join(' + ');

  // step blocks — hints NOT rendered during quiz
  const steps=[
    {n:1,lbl:'과거 힌트',pts:3,cls:'s1'},
    {n:2,lbl:'변화 힌트',pts:2,cls:'s2'},
    {n:3,lbl:'미래직업 힌트',pts:1,cls:'s3'}
  ];

  const blocksHTML=steps.map(st=>{
    const open=st.n<=S.step;
    const showInput=st.n===S.step&&!S.done;
    return `
    <div class="sblock" id="sb${st.n}">
      <div class="shdr">
        <span class="spill ${st.cls}">STEP ${st.n}</span>
        <span class="smeta">${st.lbl}</span>
        <span class="spts ${st.cls}" id="spts${st.n}">${open?st.pts+'점':'— 점'}</span>
        <span class="slock" id="slk${st.n}">${open?'🔓':'🔒'}</span>
      </div>
      <div class="scontent${open?' open':''}" id="sc${st.n}">
        <div class="dots-row" id="dr${st.n}">${dots(st.n)}</div>
        <div class="fblist" id="fb${st.n}"></div>
        <div class="iarea" id="ia${st.n}" style="${showInput?'':'display:none'}">
          <div class="iwrap" id="iw${st.n}">
            <input class="ainput" id="inp${st.n}" type="text" placeholder="미래 직업을 입력하세요…" autocomplete="off"/>
            <button class="sbtn" id="btn${st.n}" onclick="submit(${st.n})">확인</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('quiz-area').innerHTML=`
    <div class="card fade-up">
      <div class="clue-area">
        <div class="clue-lbl">ANSWER CLUE</div>
        <div class="char-boxes">${boxes}</div>
        <div class="cnt-badge"><span>총 ${total}글자</span><span style="opacity:.4">|</span><span>${info}</span></div>
      </div>
      ${blocksHTML}
      <div class="reveal" id="rev">
        <div class="rv-lbl">✦ 정답</div>
        <div class="rv-txt" id="rvtxt"></div>
      </div>
    </div>
    <button class="nxtbtn" id="nxt" onclick="next()">
      ${S.qi<Q.length-1?'다음 문제 →':'결과 보기 →'}
    </button>`;

  // bind enter
  for(let n=1;n<=3;n++){
    const el=document.getElementById(`inp${n}`);
    if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(n); });
  }
  focusStep(S.step);
}

function dots(n){
  const used=S.att[n]||0;
  let h='';
  for(let i=0;i<MAX;i++) h+=`<div class="dot ${i<used?'used':'idle'}"></div>`;
  h+=`<span class="dots-lbl">남은 기회: ${MAX-used}번</span>`;
  return h;
}
function refreshDots(n){ const el=document.getElementById(`dr${n}`); if(el) el.innerHTML=dots(n); }

function focusStep(n){
  const el=document.getElementById(`inp${n}`);
  if(el&&!el.disabled) setTimeout(()=>el.focus(),120);
}

/* ── submit ── */
function submit(n){
  if(S.done) return;
  const inp=document.getElementById(`inp${n}`);
  if(!inp||inp.disabled) return;
  const val=inp.value.trim();
  if(!val) return;

  S.att[n]=(S.att[n]||0)+1;
  refreshDots(n);

  if(match(val,Q[S.qi].answer)){
    const pts=n===1?3:n===2?2:1;
    addFb(n,'ok',`🎉 정답! +${pts}점 획득!`);
    finish(pts,n);
  } else {
    inp.value='';
    shake(`iw${n}`);
    const left=MAX-S.att[n];
    if(left>0){
      addFb(n,'wrong',`❌ 틀렸어요! 남은 기회: ${left}번`);
    } else {
      addFb(n,'wrong','❌ 기회를 모두 사용했어요.');
      disableStep(n);
      if(n<3){
        setTimeout(()=>openStep(n+1),350);
      } else {
        addFb(n,'half','😢 모든 힌트를 다 썼어요. 정답의 절반인 0.5점!');
        finish(0.5,n,true);
      }
    }
  }
}

function addFb(n,cls,msg){
  const el=document.getElementById(`fb${n}`);
  if(!el) return;
  const d=document.createElement('div');
  d.className=`fb ${cls}`;
  d.textContent=msg;
  el.appendChild(d);
}

function disableStep(n){
  const inp=document.getElementById(`inp${n}`);
  const btn=document.getElementById(`btn${n}`);
  if(inp) inp.disabled=true;
  if(btn) btn.disabled=true;
}

function openStep(n){
  S.step=n;
  // open content
  const sc=document.getElementById(`sc${n}`);
  const lk=document.getElementById(`slk${n}`);
  const sp=document.getElementById(`spts${n}`);
  const ia=document.getElementById(`ia${n}`);
  if(sc) sc.classList.add('open');
  if(lk) lk.textContent='🔓';
  if(sp) sp.textContent=(n===1?3:n===2?2:1)+'점';
  if(ia) ia.style.display='';
  refreshDots(n);
  focusStep(n);
}

function finish(pts,step,failed=false){
  S.done=true;
  S.total+=pts;
  S.log.push({qi:S.qi,answer:Q[S.qi].answer,pts,step,failed,
    hint1:Q[S.qi].hint1,hint2:Q[S.qi].hint2,hint3:Q[S.qi].hint3,stepsReached:step});

  document.getElementById('tscore').textContent=S.total;

  // disable all
  for(let n=1;n<=3;n++) disableStep(n);

  // show answer
  const rv=document.getElementById('rev');
  const rvt=document.getElementById('rvtxt');
  if(rv&&rvt){ rvt.textContent=Q[S.qi].answer; rv.classList.add('show'); }

  // pulse
  if(!failed){
    const card=document.querySelector('.card');
    if(card){ card.classList.add('pulse'); setTimeout(()=>card.classList.remove('pulse'),600); }
  }

  // show next
  const nxt=document.getElementById('nxt');
  if(nxt) nxt.classList.add('show');

  updateLog();
}

function shake(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),350);
}

/* ── navigation ── */
function next(){
  if(!S.done) return;
  if(S.qi<Q.length-1){
    S.qi++; S.step=1; S.done=false; S.att={1:0,2:0,3:0};
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    showResult();
  }
}

function updateLog(){
  const el=document.getElementById('slog');
  const list=document.getElementById('loglist');
  if(!el||!list||S.log.length===0) return;
  el.style.display='block';
  list.innerHTML=S.log.map(item=>{
    const pc=item.pts>=3?'p3':item.pts>=2?'p2':item.pts>=1?'p1':item.pts===0.5?'ph':'p0';
    return `<div class="litem">
      <span class="lq">Q${item.qi+1}</span>
      <span class="lans">${item.answer}</span>
      <span class="lpts ${pc}">+${item.pts}점</span>
    </div>`;
  }).join('');
}

/* ── result ── */
function showResult(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('slog').style.display='none';

  const maxPts=Q.length*3;
  const pct=Math.round(S.total/maxPts*100);
  let em='😵',msg='아직 기초 단계예요!',sub='다시 도전해보세요.';
  if(pct===100){em='🏆';msg='완벽한 추리력!';sub='모든 문제를 최고점으로 맞혔어요!';}
  else if(pct>=80){em='🎉';msg='훌륭해요!';sub='미래 직업 전문가 수준이에요.';}
  else if(pct>=60){em='👍';msg='잘했어요!';sub='꽤 날카로운 추리력이에요.';}
  else if(pct>=40){em='🤔';msg='아쉽네요!';sub='다시 도전하면 더 잘할 수 있을 거예요.';}

  document.getElementById('rem').textContent=em;
  document.getElementById('rmsg').textContent=msg;
  document.getElementById('rsub').textContent=sub;
  document.getElementById('rbig').textContent=S.total+'점';
  document.getElementById('rmax').textContent=`만점 ${maxPts}점 중 (${pct}%)`;

  // review cards — show reached steps + optional reveal for the rest
  document.getElementById('revlist').innerHTML=S.log.map((item,i)=>{
    const pc=item.pts>=3?'p3':item.pts>=2?'p2':item.pts>=1?'p1':item.pts===0.5?'ph':'p0';
    const stepDefs=[
      {n:1,cls:'s1',lbl:'과거 힌트',txt:item.hint1},
      {n:2,cls:'s2',lbl:'변화 힌트',txt:item.hint2},
      {n:3,cls:'s3',lbl:'미래직업 힌트',txt:item.hint3}
    ];
    const shownSteps=stepDefs.filter(s=>s.n<=item.stepsReached);
    const hiddenSteps=stepDefs.filter(s=>s.n>item.stepsReached);
    const hasHidden=hiddenSteps.length>0;
    return `
    <div class="rcard">
      <div class="rcard-hdr" onclick="toggleRev(${i})">
        <span class="rnum">Q${item.qi+1}</span>
        <span class="rans">${item.answer}</span>
        <span class="rpts ${pc}">+${item.pts}점</span>
        <span class="rchev" id="rchev${i}">▼</span>
      </div>
      <div class="rbody" id="rbody${i}">
        ${shownSteps.map(s=>`
          <div class="rstep">
            <span class="rspill ${s.cls}">STEP ${s.n}</span>
            <div>
              <div class="rslbl">${s.lbl}</div>
              <div class="rstxt">${s.txt}</div>
            </div>
          </div>`).join('')}
        ${hasHidden?`
        <div class="rstep-more" id="more${i}" style="display:none">
          ${hiddenSteps.map(s=>`
            <div class="rstep">
              <span class="rspill ${s.cls}">STEP ${s.n}</span>
              <div>
                <div class="rslbl">${s.lbl}</div>
                <div class="rstxt">${s.txt}</div>
              </div>
            </div>`).join('')}
        </div>
        <div class="more-btn-wrap" id="morebtn${i}">
          <button class="more-btn" onclick="revealMore(${i})">나머지 힌트 확인하기 ▾</button>
        </div>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('result').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function revealMore(i){
  const more=document.getElementById(`more${i}`);
  const btn=document.getElementById(`morebtn${i}`);
  if(more) more.style.display='block';
  if(btn) btn.style.display='none';
}

function toggleRev(i){
  const b=document.getElementById(`rbody${i}`);
  const c=document.getElementById(`rchev${i}`);
  if(!b) return;
  b.classList.toggle('open');
  if(c) c.classList.toggle('open');
}

function restart(){
  S={qi:0,step:1,done:false,att:{1:0,2:0,3:0},total:0,log:[]};
  document.getElementById('tscore').textContent=0;
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-area').style.display='';
  document.getElementById('slog').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
